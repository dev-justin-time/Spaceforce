<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape" name="viewport"/>
<title>Spaceforce Squadron - Flight Battle</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&amp;family=Noto+Sans:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#06f9f9",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2323",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                    backgroundImage: {
                        'grid-pattern': "linear-gradient(to right, rgba(6, 249, 249, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(6, 249, 249, 0.1) 1px, transparent 1px)",
                    }
                },
            },
        }
    </script>
<style>
        /* Custom styles for wireframe effects and specific perspective */
        .perspective-container {
            perspective: 800px;
            overflow: hidden;
        }
        
        .floor-grid {
            transform: rotateX(60deg) scale(2);
            transform-origin: 50% 100%;
            background-size: 40px 40px;
            /* Fading mask for the horizon */
            mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%);
        }

        .mountain-wireframe {
            fill: rgba(15, 35, 35, 0.9);
            stroke: #06f9f9;
            stroke-width: 1.5px;
            vector-effect: non-scaling-stroke;
            filter: drop-shadow(0 0 5px rgba(6, 249, 249, 0.3));
        }

        .hud-glow {
            text-shadow: 0 0 8px rgba(6, 249, 249, 0.6);
        }

        .crosshair-reticle {
            box-shadow: 0 0 15px rgba(6, 249, 249, 0.3);
        }

        /* Starfield animation simulation via static positions for this task */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-white font-display overflow-hidden w-full h-screen selection:bg-primary/30">
<!-- Main Game Container -->
<div class="relative w-full h-full flex flex-col group/design-root">
<!-- LAYER 0: Deep Space Background & Starfield -->
<div class="absolute inset-0 bg-gradient-to-b from-[#050b0b] via-[#0f2323] to-[#1a3a3a] z-0" data-alt="Deep dark space gradient background"></div>
<!-- Stars -->
<div class="absolute inset-0 z-0 opacity-60">
<div class="star w-[2px] h-[2px] top-[10%] left-[20%]"></div>
<div class="star w-[3px] h-[3px] top-[15%] left-[80%]"></div>
<div class="star w-[1px] h-[1px] top-[40%] left-[40%]"></div>
<div class="star w-[2px] h-[2px] top-[60%] left-[10%]"></div>
<div class="star w-[2px] h-[2px] top-[70%] left-[90%]"></div>
<div class="star w-[1px] h-[1px] top-[20%] left-[60%]"></div>
<div class="star w-[3px] h-[3px] top-[80%] left-[30%]"></div>
<div class="star w-[1px] h-[1px] top-[50%] left-[70%]"></div>
</div>
<!-- LAYER 1: Perspective Grid Floor -->
<div class="absolute inset-0 flex items-end justify-center z-10 perspective-container pointer-events-none">
<div class="w-full h-[150%] bg-grid-pattern floor-grid absolute bottom-[-50%]"></div>
</div>
<!-- LAYER 2: Wireframe Mountains -->
<div class="absolute inset-0 z-20 pointer-events-none flex justify-between items-end">
<!-- Left Mountain Range -->
<div class="w-1/3 h-2/3 relative origin-bottom-left transform translate-y-10 scale-110">
<svg class="w-full h-full opacity-80" preserveaspectratio="none" viewbox="0 0 400 300">
<path class="mountain-wireframe opacity-60" d="M-50,300 L0,250 L50,280 L100,150 L150,220 L200,180 L250,260 L350,300 L400,350 L-50,350 Z"></path>
<path class="mountain-wireframe" d="M-20,300 L40,200 L100,240 L160,100 L220,180 L300,300 Z"></path>
<!-- Grid lines on mountains -->
<path d="M40,200 L40,300 M160,100 L160,300 M220,180 L220,300" fill="none" stroke="#06f9f9" stroke-opacity="0.3" stroke-width="0.5"></path>
</svg>
</div>
<!-- Right Mountain Range -->
<div class="w-1/3 h-3/4 relative origin-bottom-right transform translate-y-10">
<svg class="w-full h-full opacity-80" preserveaspectratio="none" viewbox="0 0 400 300">
<path class="mountain-wireframe opacity-60" d="M450,300 L350,220 L300,260 L200,120 L150,200 L100,180 L0,300 L450,350 Z"></path>
<path class="mountain-wireframe" d="M420,300 L360,180 L300,220 L200,80 L120,220 L80,300 Z"></path>
<!-- Grid lines on mountains -->
<path d="M360,180 L360,300 M200,80 L200,300 M120,220 L120,300" fill="none" stroke="#06f9f9" stroke-opacity="0.3" stroke-width="0.5"></path>
</svg>
</div>
</div>
<!-- LAYER 3: Horizon Fog -->
<div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-background-dark/90 to-transparent z-10 pointer-events-none"></div>
<!-- LAYER 4: HUD Overlay (Interactive/Data Layer) -->
<div class="relative z-30 flex flex-col justify-between h-full p-4 lg:p-6 pointer-events-none">
<!-- Top HUD Bar -->
<header class="flex items-start justify-between w-full pointer-events-auto">
<!-- Pause / Menu -->
<button class="group flex items-center justify-center size-12 rounded border border-primary/30 bg-background-dark/80 hover:bg-primary/20 backdrop-blur-sm transition-all">
<span class="material-symbols-outlined text-primary group-hover:text-white transition-colors" style="font-size: 28px;">pause</span>
</button>
<!-- Center Score -->
<div class="flex flex-col items-center mt-2">
<div class="px-6 py-1 border-x border-primary/30 bg-background-dark/50 backdrop-blur-md">
<h2 class="text-white text-2xl lg:text-3xl font-bold leading-tight tracking-[0.1em] hud-glow">004520</h2>
</div>
<span class="text-primary/70 text-xs font-medium tracking-[0.2em] mt-1">SCORE</span>
</div>
<!-- Wave Indicator -->
<div class="flex flex-col items-end">
<div class="flex items-center gap-2 px-3 py-1 rounded bg-primary/10 border border-primary/20 backdrop-blur-sm">
<span class="material-symbols-outlined text-primary animate-pulse" style="font-size: 20px;">warning</span>
<p class="text-primary text-lg font-bold leading-normal tracking-widest">WAVE 3</p>
</div>
<div class="flex gap-1 mt-1">
<div class="w-2 h-1 bg-primary rounded-full"></div>
<div class="w-2 h-1 bg-primary rounded-full"></div>
<div class="w-2 h-1 bg-primary rounded-full"></div>
<div class="w-2 h-1 bg-primary/20 rounded-full"></div>
</div>
</div>
</header>
<!-- Center Crosshair -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center pointer-events-none">
<!-- Outer ring -->
<div class="w-16 h-16 border border-primary/30 rounded-full flex items-center justify-center crosshair-reticle">
<!-- Inner dot -->
<div class="w-1 h-1 bg-primary rounded-full"></div>
</div>
<!-- Cross lines -->
<div class="absolute w-24 h-[1px] bg-gradient-to-r from-transparent via-primary/50 to-transparent"></div>
<div class="absolute h-24 w-[1px] bg-gradient-to-b from-transparent via-primary/50 to-transparent"></div>
<!-- Decorative brackets -->
<span class="absolute -left-4 text-primary/40 material-symbols-outlined" style="font-size: 24px;">chevron_left</span>
<span class="absolute -right-4 text-primary/40 material-symbols-outlined" style="font-size: 24px;">chevron_right</span>
</div>
<!-- Bottom HUD Area -->
<footer class="flex items-end justify-between w-full mt-auto pointer-events-auto">
<!-- Weapon Status (Left) -->
<div class="flex flex-col gap-2 w-48">
<div class="flex items-center gap-3 p-3 rounded-tr-xl border-l-2 border-primary bg-gradient-to-r from-background-dark/90 to-transparent backdrop-blur-sm">
<div class="flex items-center justify-center size-10 rounded bg-primary/10 border border-primary/30 text-primary">
<span class="material-symbols-outlined">rocket_launch</span>
</div>
<div class="flex flex-col">
<span class="text-white text-sm font-bold tracking-wider leading-none">LASER V2</span>
<span class="text-primary/70 text-[10px] uppercase font-bold tracking-widest mt-1">Unlimited</span>
</div>
</div>
<!-- Secondary Weapon Slot (Inactive) -->
<div class="flex items-center gap-2 pl-3 opacity-50">
<span class="material-symbols-outlined text-primary/50 text-sm">change_circle</span>
<span class="text-white/50 text-xs">SWITCH WEAPON</span>
</div>
</div>
<!-- Shield Integrity (Right) -->
<div class="flex flex-col gap-2 w-64 items-end">
<div class="flex w-full justify-between items-end mb-1 px-1">
<p class="text-primary/80 text-xs font-bold tracking-wider">SHIELD INTEGRITY</p>
<p class="text-white text-lg font-bold leading-none hud-glow">100%</p>
</div>
<!-- Progress Bar Component -->
<div class="w-full h-3 rounded-full bg-background-dark/80 border border-primary/20 overflow-hidden relative skew-x-[-12deg]">
<!-- Background Grid inside bar -->
<div class="absolute inset-0 w-full h-full bg-[linear-gradient(90deg,transparent_2px,#000_2px)] bg-[size:10px_100%] z-10 opacity-30"></div>
<!-- Fill -->
<div class="h-full bg-primary shadow-[0_0_10px_#06f9f9] transition-all duration-300" style="width: 100%;"></div>
</div>
<!-- Hull Integrity (Secondary) -->
<div class="w-3/4 h-1.5 mt-1 rounded-full bg-background-dark/80 border border-red-500/20 overflow-hidden relative skew-x-[-12deg]">
<div class="h-full bg-red-500 shadow-[0_0_8px_red]" style="width: 85%;"></div>
</div>
</div>
</footer>
</div>
<!-- Scanlines Overlay (Retro Effect) -->
<div class="absolute inset-0 pointer-events-none z-40 bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] bg-[length:100%_2px,3px_100%] opacity-20"></div>
</div>
</body></html>
